<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizzaria Irare</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <nav>
        <img id="logo" src="img/icon.png" alt="Logo da Pizzaria Irarire" />
        <ul class="list-without-bullets">
          <li><a href="components/sobre.html">Sobre</a></li>
          <li><a href="#contato">Contato</a></li>
        </ul>
        <form action="search" method="get">
          <input
            id="search"
            class="caixa-pesquisa"
            type="text"
            placeholder="Buscar..."
          />
        </form>
        <ul class="list-without-bullets">
          <li><a href="components/login.html">Entrar</a></li>
          <li>
            <a id="cadastro-button" href="components/cadastro.html"
              >Criar Conta</a
            >
          </li>
        </ul>
        <a href=""
          ><img
            id="shopping-cart"
            src="img/shoppingCart.png"
            alt="Carrinho de compras"
        /></a>
      </nav>
    </header>
    <main>
      <section>
        <div class="body-grid">
          <div class="container">
            <div class="conttent-box">
              <h2>Promoções quentes</h2>
            </div>
            <div class="conttent-box">
              <h3>2 Pizzas por R$69,99</h3>
              <div class="pizzas-grid">
                <div class="pizza-card">
                  <img
                    id="pizzaPromo1"
                    src="img/pizza1.png"
                    alt="Pizza de calabresa"
                  />
                </div>
                <div class="pizza-card">
                  <img
                    id="pizzaPromo2"
                    src="img/pizza2.png"
                    alt="Pizza de frango com catupiry"
                  />
                </div>
              </div>
            </div>
            <img id="fogos" src="img/fogos.png" alt="Diversos fogos" />
          </div>
          <div class="container">
            <aside>
              <a class="cardapio-button" href="components/cardapio.html">
                <p>Nosso Cardápio</p>
                <img id="seta-cardapio" src="img/seta.png" alt="Seta" />
              </a>
            </aside>
          </div>
        </div>
        <img
          id="pizza-fundo"
          src="img/pizzaFundo.png"
          alt="Pizza de calabresa"
        />
      </section>
    </main>
    <footer id="contato">
      <p>Tell: (11) 99999-9999</p>
      <p>Email: pizzariairare@gmail.com</p>
      <small>© 2026 Pizzaria Irare. Todos os direitos reservados.</small>
    </footer>
  </body>
</html>
