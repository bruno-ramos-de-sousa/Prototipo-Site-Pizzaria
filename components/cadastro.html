<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <nav>
            <div class="buttons-back">
                <a href="../index.html"><img id="button-back-red" src="../img/botton_Red.png"
                        alt="Botão redondo vermelho"></a>
                <a href="../index.html"><img id="button-back-yellow" src="../img/botton_Yellow.png"
                        alt="Botão redondo amarelo"></a>
            </div>
            <ul class="list-without-bullets">
                <li><a href="../components/sobre.html">Sobre</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
            <form action="search" method="get">
                <input type="text" placeholder="Buscar...">
            </form>
            <div class="user-greeting">
                <p>Olá, usuário</p>
                <a href=""><img src="../img/user.png" alt=""></a>
            </div>
            <a href=""><img id="shopping-cart" src="../img/shoppingCart.png" alt="Carrinho de compras"></a>
        </nav>
    </header>
    <section>
        <div class="body-grid">
            <img id="logo-loja" src="../img/loja.png" alt="Pizzaria Irarire">
            <div id="cadastrar" class="body-card-orange">
                <aside>
                    <h2>Cadastre-se!</h2>
                    <p>Já tem conta? <a href="login.html">Faça login</a></p>
                    <form action="">
                        <p>Nome:</p>
                        <input type="text" placeholder="Digite seu nome">
                        <p>E-mail:</p>
                        <input type="email" placeholder="Digite seu e-mail">
                        <p>Senha:</p>
                        <input type="password" placeholder="Digite sua senha">
                        <p>Confirmar Senha:</p>
                        <input type="password" placeholder="Confirme sua senha">
                        <div class="flex-row-unjustify">
                            <input type="checkbox"> Aceito os termos
                        </div>
                        <button type="submit">Cadastrar</button>
                    </form>
                </aside>
            </div>
        </div>
    </section>
    <footer id="contato">
        <p>Tell: (11) 99999-9999</p>
        <p>Email: pizzariairare@gmail.com</p>
        <small>© 2026 Pizzaria Irarire. Todos os direitos reservados.</small>
    </footer>

</body>

</html>
